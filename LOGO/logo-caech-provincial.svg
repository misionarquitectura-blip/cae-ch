<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 130" width="340" height="130">

  <!-- ── SÍMBOLO CIRCULAR CAE ── -->
  <circle cx="62" cy="62" r="56" fill="#CC0000"/>

  <!-- C superior: arco abierto hacia abajo -->
  <path d="M62 18 C42 18 26 34 26 54 C26 68 34 80 46 87"
        fill="none" stroke="white" stroke-width="9" stroke-linecap="round"/>

  <!-- A inferior izquierdo: arco abierto hacia arriba-derecha -->
  <path d="M28 74 C18 84 18 98 28 106 C38 114 54 112 62 104"
        fill="none" stroke="white" stroke-width="9" stroke-linecap="round"/>

  <!-- E inferior derecho: arco abierto hacia arriba-izquierda -->
  <path d="M96 74 C106 84 106 98 96 106 C86 114 70 112 62 104"
        fill="none" stroke="white" stroke-width="9" stroke-linecap="round"/>

  <!-- Punto central de intersección -->
  <circle cx="62" cy="78" r="6" fill="white"/>

  <!-- ── TEXTOS ── -->

  <!-- CAE-CH grande -->
  <text x="136" y="50"
        font-family="'Arial Black', Arial, sans-serif"
        font-weight="900" font-size="38" fill="#CC0000" letter-spacing="2">CAE-CH</text>

  <!-- Línea roja separadora -->
  <line x1="136" y1="60" x2="328" y2="60" stroke="#CC0000" stroke-width="2.5"/>

  <!-- PROVINCIAL DE CHIMBORAZO -->
  <text x="136" y="78"
        font-family="Arial, sans-serif"
        font-weight="700" font-size="13.5" fill="#2F2F2F" letter-spacing="2">PROVINCIAL DE CHIMBORAZO</text>

  <!-- Silueta Chimborazo (perfil del volcán, minimalista) -->
  <polyline points="136,108 158,88 170,94 182,80 194,88 214,108"
            fill="none" stroke="#CC0000" stroke-width="2.5"
            stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Nieve cima -->
  <polyline points="176,84 182,80 188,84"
            fill="none" stroke="white" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Texto inferior pequeño -->
  <text x="136" y="124"
        font-family="Arial, sans-serif"
        font-weight="400" font-size="9.5" fill="#5A5A5A" letter-spacing="1">COLEGIO DE ARQUITECTOS DEL ECUADOR</text>

</svg>
